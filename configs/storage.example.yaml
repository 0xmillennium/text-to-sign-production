# Example operational storage config for Sprint 2 Colab runs.
# Copy this to `configs/storage.local.yaml` locally or inside Colab if you want
# non-default download/upload behavior. Never commit private Drive paths,
# folder IDs, share URLs, or credentials.

provider: google_drive

# Logical artifact grouping name used under the mounted storage root.
artifact_root: thesis-artifacts/text-to-sign-production

# Replace this locally when you want a stable run identifier.
run_label: sprint2-colab-example-run

# Enable browser download for selected archives in the Colab notebook.
local_download: true

# Enable copying archives into mounted private/shared storage.
upload_to_storage: false

folder_naming:
  run_subdirectory_enabled: true
  manifests_reports_subdirectory: manifests-reports
  samples_subdirectory: samples

google_drive:
  mount_path: /content/drive
  relative_root: MyDrive/text-to-sign-production/artifacts

archives:
  manifests_reports: sprint2_manifests_reports.tar.zst
  train_samples: sprint2_samples_train.tar.zst
  val_samples: sprint2_samples_val.tar.zst
  test_samples: sprint2_samples_test.tar.zst
