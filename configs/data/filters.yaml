families:
  oob:
    loose:
      max_out_of_bounds_ratio: 0.05
    clean:
      max_out_of_bounds_ratio: 0.02
    tight:
      max_out_of_bounds_ratio: 0.01

  coverage:
    loose:
      min_body_landmark_coverage_ratio: 0.50
      min_any_hand_landmark_coverage_ratio: 0.50
      min_face_landmark_coverage_ratio: 0.50
    clean:
      min_body_landmark_coverage_ratio: 0.70
      min_any_hand_landmark_coverage_ratio: 0.70
      min_face_landmark_coverage_ratio: 0.70
    tight:
      min_body_landmark_coverage_ratio: 0.85
      min_any_hand_landmark_coverage_ratio: 0.85
      min_face_landmark_coverage_ratio: 0.85

  hand:
    loose:
      min_any_hand_available_frame_ratio: 0.50
      max_any_hand_unavailable_run_ratio: 0.50
    clean:
      min_any_hand_available_frame_ratio: 0.70
      max_any_hand_unavailable_run_ratio: 0.30
    tight:
      min_any_hand_available_frame_ratio: 0.85
      max_any_hand_unavailable_run_ratio: 0.15

  face:
    loose:
      min_face_available_frame_ratio: 0.50
    clean:
      min_face_available_frame_ratio: 0.70
    tight:
      min_face_available_frame_ratio: 0.85

  confidence:
    loose:
      min_body_mean_confidence: 0.20
      min_left_hand_mean_confidence: 0.20
      min_right_hand_mean_confidence: 0.20
      min_face_mean_confidence: 0.20
    clean:
      min_body_mean_confidence: 0.35
      min_left_hand_mean_confidence: 0.35
      min_right_hand_mean_confidence: 0.35
      min_face_mean_confidence: 0.35
    tight:
      min_body_mean_confidence: 0.50
      min_left_hand_mean_confidence: 0.50
      min_right_hand_mean_confidence: 0.50
      min_face_mean_confidence: 0.50

  text:
    loose:
      min_character_count: 2
      min_token_count: 1
    clean:
      min_character_count: 4
      min_token_count: 1
    tight:
      min_character_count: 6
      min_token_count: 2

  length:
    loose:
      min_num_frames: 8
      min_duration_seconds: 0.25
    clean:
      min_num_frames: 12
      min_duration_seconds: 0.40
    tight:
      min_num_frames: 16
      min_duration_seconds: 0.55
