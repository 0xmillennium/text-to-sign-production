stages:
  dataset_build:
    cmd: python scripts/dataset_build.py --no-package
    deps:
      - scripts/dataset_build.py
      - src/text_to_sign_production/data
      - src/text_to_sign_production/ops
      - src/text_to_sign_production/workflows
      - configs/data/filter-v1.yaml
      - data/raw/how2sign/translations
      - data/raw/how2sign/bfh_keypoints
    outs:
      - data/interim/raw_manifests
      - data/interim/normalized_manifests
      - data/interim/filtered_manifests
      - data/processed/v1/samples
      - data/processed/v1/manifests
      - data/processed/v1/reports
    metrics:
      - data/interim/reports/assumption-report.json
      - data/interim/reports/filter-report.json
