data:
  train_manifest: data/processed/v1/manifests/train.jsonl
  val_manifest: data/processed/v1/manifests/val.jsonl
  train_split: train
  val_split: val

backbone:
  name: google/flan-t5-base
  max_length: 128
  local_files_only: false
  freeze: true

model:
  decoder_hidden_dim: 256
  latent_dim: 256

training:
  epochs: 1
  batch_size: 2
  shuffle_train: true
  num_workers: 0
  seed: 13
  device: auto

optimizer:
  name: adamw
  learning_rate: 0.0001
  weight_decay: 0.0

checkpoint:
  output_dir: outputs/modeling/baseline
