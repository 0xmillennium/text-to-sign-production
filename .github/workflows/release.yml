name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Reuse CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
