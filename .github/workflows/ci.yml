name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs,modeling]"

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: SKIP=no-commit-to-branch pre-commit run --all-files --show-diff-on-failure

      - name: Audit installed dependencies
        run: |
          # Skip the local editable project package, which is not published on PyPI.
          # Temporary ignore:
          # CVE-2026-3219 affects the installed pip version, and the reported fixed
          # version is not currently available in this environment. Remove this ignore
          # after a fixed pip release is available and CI can upgrade to it.
          python -m pip_audit --local --skip-editable --ignore-vuln CVE-2026-3219

      - name: Lint commit messages
        if: github.event_name != 'workflow_call'
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yaml

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,modeling]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=text_to_sign_production \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python-3.11
          path: coverage.xml

  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and docs tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build MkDocs site
        run: mkdocs build --strict
